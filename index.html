<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 Visual Deadline Balance — 校园学业压力看板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #97C459;
    --yellow: #854F0B; --yellow-bg: #FAEEDA; --yellow-border: #EF9F27;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #E24B4A;
    --gray: #5F5E5A; --gray-bg: #F1EFE8; --gray-border: #B4B2A9;
    --text: #2C2C2A; --text-muted: #5F5E5A;
    --border: #D3D1C7; --surface: #fff; --page-bg: #F8F7F4;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--page-bg); color: var(--text); min-height: 100vh; }

  /* SYNC INDICATOR */
  .sync-bar { height: 3px; background: transparent; position: fixed; top: 0; left: 0; right: 0; z-index: 999; transition: background 0.3s; }
  .sync-bar.syncing { background: linear-gradient(90deg, #378ADD 0%, #97C459 50%, #378ADD 100%); background-size: 200%; animation: syncAnim 1s linear infinite; }
  @keyframes syncAnim { from { background-position: 0% } to { background-position: 200% } }

  .sync-status { position: fixed; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; z-index: 100; transition: opacity 0.5s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #B4B2A9; }
  .sync-dot.live { background: #639922; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: #E24B4A; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo h1 { font-size: 16px; font-weight: 600; }
  .logo p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .legend { display: flex; gap: 12px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .nav-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.15s; }
  .nav-btn:hover { background: var(--gray-bg); }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-title { font-size: 15px; font-weight: 600; min-width: 120px; text-align: center; }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }

  .calendar-grid { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--gray-bg); border-bottom: 1px solid var(--border); }
  .weekday-header div { text-align: center; padding: 10px 4px; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

  .day-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 120px; padding: 8px; position: relative; cursor: pointer; transition: filter 0.1s; }
  .day-cell:hover { filter: brightness(0.97); }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell.other-month { background: #FAFAF8; }
  .day-cell.other-month .day-num { color: #C8C7C2; }
  .day-cell.today .day-num { background: #378ADD; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-weight: 600; }
  .day-cell.stress-green { background: #EAF3DE; }
  .day-cell.stress-yellow { background: #FFFBF0; }
  .day-cell.stress-red { background: #FFF5F5; }

  .day-num { font-size: 13px; font-weight: 500; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; flex-shrink: 0; }
  .stress-badge { position: absolute; top: 8px; right: 8px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .deadline-list { display: flex; flex-direction: column; gap: 3px; margin-top: 2px; }
  .deadline-pill { font-size: 10px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: flex; align-items: center; gap: 3px; }
  .pill-math    { background: #E6F1FB; color: #185FA5; }
  .pill-english { background: #EAF3DE; color: #3B6D11; }
  .pill-science { background: #FAEEDA; color: #854F0B; }
  .pill-history { background: #FBEAF0; color: #993556; }
  .pill-tok     { background: #EEEDFE; color: #534AB7; }
  .pill-ee      { background: #FAECE7; color: #993C1D; }
  .pill-other   { background: #F1EFE8; color: #5F5E5A; }

  .add-btn { margin-top: 4px; width: 100%; background: none; border: 1px dashed var(--border); border-radius: 4px; padding: 3px; font-size: 10px; color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.15s; display: none; }
  .day-cell:hover .add-btn { display: block; }
  .add-btn:hover { border-color: #378ADD; color: #378ADD; background: #F0F7FF; }
  .overflow-count { font-size: 10px; color: var(--text-muted); padding: 2px 4px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; padding: 24px; width: 380px; max-width: 90vw; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; font-family: inherit; }
  .form-group input:focus, .form-group select:focus { border-color: #378ADD; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .btn-cancel { padding: 8px 16px; border: 1px solid var(--border); border-radius: 7px; background: none; cursor: pointer; font-size: 13px; color: var(--text); }
  .btn-save { padding: 8px 16px; border: none; border-radius: 7px; background: #378ADD; color: white; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-save:hover { background: #185FA5; }
  .btn-save:disabled { background: #B5D4F4; cursor: not-allowed; }

  .deadline-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--gray-bg); border-radius: 7px; margin-bottom: 6px; }
  .deadline-item-name { font-size: 13px; font-weight: 500; }
  .deadline-item-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .delete-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; padding: 4px 6px; border-radius: 4px; flex-shrink: 0; }
  .delete-btn:hover { background: var(--red-bg); color: var(--red); }

  .subject-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 3px; }

  @media (max-width: 700px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .day-cell { min-height: 80px; padding: 4px; }
    .deadline-pill { display: none; }
    .legend { display: none; }
  }
</style>
</head>
<body>

<div class="sync-bar" id="syncBar"></div>

<header>
  <div class="logo">
    <div class="logo-icon">📅</div>
    <div>
      <h1>Visual Deadline Balance</h1>
      <p>校园学业压力可视化看板</p>
    </div>
  </div>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div><span>1个 轻松</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div><span>2个 注意</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div><span>≥3个 高危</span></div>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">本月 Deadline 总数</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">🔴 高危天数</div><div class="stat-value red" id="statRed">—</div></div>
    <div class="stat-card"><div class="stat-label">🟡 注意天数</div><div class="stat-value yellow" id="statYellow">—</div></div>
    <div class="stat-card"><div class="stat-label">最繁忙一天</div><div class="stat-value" id="statBusiest" style="font-size:14px;padding-top:4px;">—</div></div>
  </div>
  <div class="calendar-grid">
    <div class="weekday-header">
      <div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div><div>SUN</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
</main>

<!-- 添加 Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>➕ 添加 Deadline</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;" id="modalDateLabel"></p>
    <div class="form-group">
      <label>学科</label>
      <select id="inputSubject">
        <option value="math">数学 Math</option>
        <option value="english">语言 English / Language</option>
        <option value="science">理科 Science</option>
        <option value="history">人文 History / Humanities</option>
        <option value="tok">TOK</option>
        <option value="ee">Extended Essay</option>
        <option value="other">其他 Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>作业名称</label>
      <input type="text" id="inputName" placeholder="例如：Chemistry IA Draft" />
    </div>
    <div class="form-group">
      <label>备注（可选）</label>
      <input type="text" id="inputNote" placeholder="例如：需要提交纸质版" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-save" id="btnSave" onclick="saveDeadline()">保存</button>
    </div>
  </div>
</div>

<!-- 详情 Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h2 id="detailTitle"></h2>
    <div id="detailList"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDetailModal()">关闭</button>
      <button class="btn-save" onclick="addFromDetail()">+ 添加</button>
    </div>
  </div>
</div>

<div class="sync-status" id="syncStatus">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncText">连接中...</span>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtY3gBT75tjHgCPn59mqyl1dNAMvVHyqA",
    authDomain: "deadline-board-dd4d0.firebaseapp.com",
    databaseURL: "https://deadline-board-dd4d0-default-rtdb.firebaseio.com",
    projectId: "deadline-board-dd4d0",
    storageBucket: "deadline-board-dd4d0.firebasestorage.app",
    messagingSenderId: "1093240879376",
    appId: "1:1093240879376:web:b17fbf40da6d033a300d95"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const SUBJECTS = {
    math:    { label: '数学', color: '#185FA5', cls: 'pill-math' },
    english: { label: '语言', color: '#3B6D11', cls: 'pill-english' },
    science: { label: '理科', color: '#854F0B', cls: 'pill-science' },
    history: { label: '人文', color: '#993556', cls: 'pill-history' },
    tok:     { label: 'TOK',  color: '#534AB7', cls: 'pill-tok' },
    ee:      { label: 'EE',   color: '#993C1D', cls: 'pill-ee' },
    other:   { label: '其他', color: '#5F5E5A', cls: 'pill-other' },
  };

  let deadlines = {};
  let viewYear = new Date().getFullYear();
  let viewMonth = new Date().getMonth();
  let activeDateKey = null;
  const today = new Date();

  // 实时监听 Firebase
  const dbRef = ref(db, 'deadlines');
  onValue(dbRef, (snapshot) => {
    deadlines = snapshot.val() || {};
    render();
    setSyncLive();
  }, (error) => {
    document.getElementById('syncText').textContent = '连接失败';
  });

  function setSyncing() {
    document.getElementById('syncBar').classList.add('syncing');
    document.getElementById('syncDot').className = 'sync-dot';
    document.getElementById('syncText').textContent = '同步中...';
  }

  function setSyncLive() {
    document.getElementById('syncBar').classList.remove('syncing');
    document.getElementById('syncDot').className = 'sync-dot live';
    document.getElementById('syncText').textContent = '实时同步中';
  }

  function dk(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function render() {
    const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    document.getElementById('monthTitle').textContent = `${viewYear}年 ${monthNames[viewMonth]}`;

    const firstDay = new Date(viewYear, viewMonth, 1);
    let startDow = firstDay.getDay();
    startDow = startDow === 0 ? 6 : startDow - 1;
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();
    const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    let statTotal = 0, statRed = 0, statYellow = 0, busiestCount = 0, busiestLabel = '—';

    for (let i = 0; i < totalCells; i++) {
      let day, month, year, isOther = false;
      if (i < startDow) {
        day = daysInPrev - startDow + i + 1; month = viewMonth - 1; year = viewYear;
        if (month < 0) { month = 11; year--; } isOther = true;
      } else if (i >= startDow + daysInMonth) {
        day = i - startDow - daysInMonth + 1; month = viewMonth + 1; year = viewYear;
        if (month > 11) { month = 0; year++; } isOther = true;
      } else {
        day = i - startDow + 1; month = viewMonth; year = viewYear;
      }

      const dateKey = dk(year, month, day);
      const dayData = deadlines[dateKey] || {};
      const items = Object.entries(dayData).map(([fbKey, v]) => ({ fbKey, ...v }));
      const count = items.length;
      const stress = count === 0 ? 'none' : count === 1 ? 'green' : count === 2 ? 'yellow' : 'red';
      const isToday = year === today.getFullYear() && month === today.getMonth() && day === today.getDate();

      if (!isOther) {
        statTotal += count;
        if (stress === 'red') statRed++;
        if (stress === 'yellow') statYellow++;
        if (count > busiestCount) { busiestCount = count; busiestLabel = `${month+1}月${day}日 (${count}个)`; }
      }

      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isOther ? ' other-month' : '') + (isToday ? ' today' : '') + (stress !== 'none' ? ` stress-${stress}` : '');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = day;
      cell.appendChild(numEl);

      if (stress !== 'none') {
        const badge = document.createElement('div');
        badge.className = `stress-badge badge-${stress}`;
        badge.textContent = `${count}个`;
        cell.appendChild(badge);
      }

      if (items.length > 0) {
        const list = document.createElement('div');
        list.className = 'deadline-list';
        items.slice(0, 2).forEach(item => {
          const sub = SUBJECTS[item.subject] || SUBJECTS.other;
          const pill = document.createElement('div');
          pill.className = `deadline-pill ${sub.cls}`;
          pill.innerHTML = `<span class="subject-dot" style="background:${sub.color}"></span>${item.name}`;
          pill.title = item.name;
          list.appendChild(pill);
        });
        if (items.length > 2) {
          const more = document.createElement('div');
          more.className = 'overflow-count';
          more.textContent = `+${items.length - 2} 更多`;
          list.appendChild(more);
        }
        cell.appendChild(list);
      }

      const addBtn = document.createElement('button');
      addBtn.className = 'add-btn';
      addBtn.textContent = '+ 添加 Deadline';
      addBtn.onclick = (e) => { e.stopPropagation(); openAddModal(dateKey, year, month, day); };
      cell.appendChild(addBtn);

      cell.onclick = (e) => { if (e.target === addBtn) return; openDetailModal(dateKey, year, month, day); };
      grid.appendChild(cell);
    }

    document.getElementById('statTotal').textContent = statTotal;
    document.getElementById('statRed').textContent = statRed;
    document.getElementById('statYellow').textContent = statYellow;
    document.getElementById('statBusiest').textContent = busiestLabel;
  }

  window.changeMonth = (dir) => {
    viewMonth += dir;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
  };

  window.openAddModal = (dateKey, y, m, d) => {
    activeDateKey = dateKey;
    document.getElementById('modalDateLabel').textContent = `📅 ${y}年${m+1}月${d}日`;
    document.getElementById('inputName').value = '';
    document.getElementById('inputNote').value = '';
    document.getElementById('inputSubject').value = 'math';
    document.getElementById('btnSave').disabled = false;
    document.getElementById('addModal').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 100);
  };

  window.closeAddModal = () => document.getElementById('addModal').classList.remove('open');

  window.saveDeadline = async () => {
    const name = document.getElementById('inputName').value.trim();
    if (!name) { document.getElementById('inputName').style.borderColor='#E24B4A'; return; }
    document.getElementById('inputName').style.borderColor = '';
    document.getElementById('btnSave').disabled = true;
    setSyncing();
    const subject = document.getElementById('inputSubject').value;
    const note = document.getElementById('inputNote').value.trim();
    await push(ref(db, `deadlines/${activeDateKey}`), { subject, name, note });
    window.closeAddModal();
  };

  window.openDetailModal = (dateKey, y, m, d) => {
    activeDateKey = dateKey;
    const dayData = deadlines[dateKey] || {};
    const items = Object.entries(dayData).map(([fbKey, v]) => ({ fbKey, ...v }));
    document.getElementById('detailTitle').textContent = `${m+1}月${d}日 的 Deadline`;

    const list = document.getElementById('detailList');
    if (items.length === 0) {
      list.innerHTML = '<p style="font-size:13px;color:var(--text-muted);padding:12px 0;">这天还没有 Deadline，很轻松 ✨</p>';
    } else {
      list.innerHTML = items.map(item => {
        const sub = SUBJECTS[item.subject] || SUBJECTS.other;
        return `<div class="deadline-item">
          <div>
            <div class="deadline-item-name">${item.name}</div>
            <div class="deadline-item-sub" style="color:${sub.color}">${sub.label}${item.note ? ' · ' + item.note : ''}</div>
          </div>
          <button class="delete-btn" onclick="deleteDeadline('${dateKey}','${item.fbKey}')" title="删除">✕</button>
        </div>`;
      }).join('');
    }
    document.getElementById('detailModal').classList.add('open');
  };

  window.closeDetailModal = () => document.getElementById('detailModal').classList.remove('open');

  window.addFromDetail = () => {
    const parts = activeDateKey.split('-');
    window.closeDetailModal();
    window.openAddModal(activeDateKey, parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  };

  window.deleteDeadline = async (dateKey, fbKey) => {
    setSyncing();
    await remove(ref(db, `deadlines/${dateKey}/${fbKey}`));
    const parts = dateKey.split('-');
    window.openDetailModal(dateKey, parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  };

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('open'));
  });
</script>
</body>
</html>
